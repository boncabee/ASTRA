name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: astra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Lint with ruff
      working-directory: ./backend
      run: |
        pip install ruff
        ruff check .
    - name: Test with pytest
      working-directory: ./backend
      run: |
        pytest --cov=app --cov-fail-under=100 tests/

  lint-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    - name: Lint
      working-directory: ./frontend
      run: npm run lint
    - name: Test
      working-directory: ./frontend
      run: npm test

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Secret Scanning
      uses: gitleaks/gitleaks-action@v2
    - name: Dependency Scan Backend
      working-directory: ./backend
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt
    - name: Bandit Security Scan
      working-directory: ./backend
      run: |
        pip install bandit
        bandit -r app/ models/ core/ api/ services/ repositories/
    - name: Dependency Scan Frontend
      working-directory: ./frontend
      run: npm audit

  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend, lint-and-test-frontend, security-scan]
    steps:
    - uses: actions/checkout@v4
    - name: Build Backend
      run: docker build -t astra-backend ./backend
    - name: Build Frontend
      run: docker build -t astra-frontend ./frontend
