name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: astra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Lint with ruff
      working-directory: ./backend
      run: |
        pip install ruff
        ruff check .
    - name: Test with pytest
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/astra_test
        TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/astra_test
      run: |
        pytest --cov=app --cov=models --cov=repositories --cov=services --cov-fail-under=99 tests/

  lint-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    - name: Lint
      working-directory: ./frontend
      run: npm run lint
    - name: Test
      working-directory: ./frontend
      run: npm test

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Secret Scanning (gitleaks)
      run: |
        curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | sudo tar xz -C /usr/local/bin gitleaks
        gitleaks detect --source . --no-banner -v
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Dependency Scan Backend
      working-directory: ./backend
      run: |
        pip install pip-audit
        pip install -r requirements.txt
        pip-audit
    - name: Bandit Security Scan
      working-directory: ./backend
      run: |
        pip install bandit
        bandit -r app/
    - name: Dependency Scan Frontend
      working-directory: ./frontend
      run: npm audit --audit-level=critical || true

  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend, lint-and-test-frontend, security-scan]
    steps:
    - uses: actions/checkout@v4
    - name: Build Backend
      run: docker build -t astra-backend ./backend
    - name: Build Frontend
      run: docker build -t astra-frontend ./frontend
