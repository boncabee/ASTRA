name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Images
      run: |
        docker build -t astra-backend ./backend
        docker build -t astra-frontend ./frontend
    - name: Push to Registry (Stub)
      run: echo "Manual approval required to push"
