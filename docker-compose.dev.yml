services:

  postgres:
    image: postgres:15

    container_name: astra-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: astra
      POSTGRES_USER: astra
      POSTGRES_PASSWORD: astra

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astra"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: